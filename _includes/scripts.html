<script type="module" src="{{ base_path }}/assets/js/main.min.js"></script>

{% include analytics.html %}

{% include comments-providers/scripts.html %}

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const headings = document.querySelectorAll('section.page__content h1, section.page__content h2, section.page__content h3, section.page__content h4');
    const tocLinks = document.querySelectorAll('.toc__menu li');

    if (headings.length > 0 && tocLinks.length > 0) {
      const options = {
        root: null,
        rootMargin: '-100px 0px -80% 0px',
        threshold: 0
      };

      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const id = entry.target.getAttribute('id');
            if (id) {
              tocLinks.forEach(li => {
                const link = li.querySelector('a');
                if (link && link.getAttribute('href') === '#' + id) {
                  li.classList.add('active');
                } else {
                  li.classList.remove('active');
                }
              });
            }
          }
        });
      }, options);

      headings.forEach(heading => observer.observe(heading));
    }
  });
</script>

<!-- Custom JS Lightbox for Image Previews -->
<div id="js-lightbox" class="lightbox-overlay">
  <span class="lightbox-close" title="Close (Esc)">&times;</span>
  <div class="lightbox-scroll-container">
    <img id="js-lightbox-img" alt="Enlarged preview">
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const lightbox = document.getElementById('js-lightbox');
    const lightboxImg = document.getElementById('js-lightbox-img');
    const closeBtn = lightbox ? lightbox.querySelector('.lightbox-close') : null;
    const scrollContainer = lightbox ? lightbox.querySelector('.lightbox-scroll-container') : null;
    let isZoomed = false;

    if (!lightbox || !lightboxImg || !closeBtn || !scrollContainer) {
      return;
    }

    const resetZoom = () => {
      isZoomed = false;
      lightboxImg.classList.remove('zoomed');
    };

    const closeLightbox = () => {
      lightbox.classList.remove('active');
      resetZoom();
      document.body.classList.remove('lightbox-open');
      setTimeout(() => {
        if (!lightbox.classList.contains('active')) {
          lightboxImg.removeAttribute('src');
        }
      }, 300);
    };

    document.querySelectorAll('.lightbox-trigger').forEach(trigger => {
      trigger.addEventListener('click', function(e) {
        e.preventDefault();
        lightboxImg.src = this.getAttribute('href');
        lightbox.classList.add('active');
        document.body.classList.add('lightbox-open');
        resetZoom();
      });
    });

    lightbox.addEventListener('pointerdown', function(e) {
      if (e.target === lightbox || e.target === scrollContainer || e.target === closeBtn) {
        closeLightbox();
      }
    });

    lightboxImg.addEventListener('pointerdown', function(e) {
      e.stopPropagation();
    });

    lightboxImg.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      isZoomed = !isZoomed;
      if (isZoomed) {
        this.classList.add('zoomed');
      } else {
        this.classList.remove('zoomed');
      }
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && lightbox.classList.contains('active')) {
        e.preventDefault();
        closeLightbox();
      }
    });
  });
</script>
