<script type="module" src="{{ base_path }}/assets/js/main.min.js"></script>

{% include analytics.html %}

{% include comments-providers/scripts.html %}

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const headings = document.querySelectorAll('section.page__content h1, section.page__content h2, section.page__content h3, section.page__content h4');
    const tocLinks = document.querySelectorAll('.toc__menu li');

    if (headings.length > 0 && tocLinks.length > 0) {
      const options = {
        root: null,
        rootMargin: '-100px 0px -80% 0px',
        threshold: 0
      };

      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const id = entry.target.getAttribute('id');
            if (id) {
              tocLinks.forEach(li => {
                const link = li.querySelector('a');
                if (link && link.getAttribute('href') === '#' + id) {
                  li.classList.add('active');
                } else {
                  li.classList.remove('active');
                }
              });
            }
          }
        });
      }, options);

      headings.forEach(heading => observer.observe(heading));
    }
  });
</script>

<!-- Custom JS Lightbox for Image Previews -->
<div id="js-lightbox" class="lightbox-overlay">
  <span class="lightbox-close" title="Close (Esc)">&times;</span>
  <div class="lightbox-scroll-container">
    <img id="js-lightbox-img" src="" alt="Enlarged preview">
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const lightbox = document.getElementById('js-lightbox');
    const lightboxImg = document.getElementById('js-lightbox-img');
    const closeBtn = document.querySelector('.lightbox-close');
    let isZoomed = false;

    // Open lightbox
    document.querySelectorAll('.lightbox-trigger').forEach(trigger => {
      trigger.addEventListener('click', function(e) {
        e.preventDefault();
        lightboxImg.src = this.getAttribute('href');
        lightbox.classList.add('active');
        isZoomed = false;
        lightboxImg.classList.remove('zoomed');
      });
    });

    // Close function
    const closeLightbox = () => {
      lightbox.classList.remove('active');
      setTimeout(() => { lightboxImg.src = ''; }, 300); // clear source after fade out
    };

    // Close on click outside, or click on close button
    lightbox.addEventListener('click', function(e) {
      if (e.target !== lightboxImg) {
        closeLightbox();
      }
    });

    // Toggle zoom on image click
    lightboxImg.addEventListener('click', function(e) {
      e.stopPropagation();
      isZoomed = !isZoomed;
      if (isZoomed) {
        // Calculate 200% of current display size
        const currentWidth = this.clientWidth;
        this.style.width = (currentWidth * 2) + 'px';
        this.style.maxWidth = 'none';
        this.style.maxHeight = 'none';
        this.classList.add('zoomed');
      } else {
        this.style.width = '';
        this.style.maxWidth = '';
        this.style.maxHeight = '';
        this.classList.remove('zoomed');
      }
    });

    // Close on ESC key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && lightbox.classList.contains('active')) {
        closeLightbox();
      }
    });
  });
</script>
